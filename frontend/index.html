<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Queue — Multi-Window Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Error Overlay -->
    <div id="errorOverlay" class="error-overlay hidden">
        <div class="error-modal">
            <div class="error-icon">⚠️</div>
            <h2>Connection Error</h2>
            <p>Backend server not running on port 5000</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="app-layout" id="mainContainer">

        <!-- ══════════ SIDEBAR (CONTROLS) ══════════ -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">🏦</div>
                <div>
                    <h1>SmartQueue</h1>
                    <p>Bank Simulation</p>
                </div>
            </div>

            <!-- Add Client -->
            <section class="sidebar-card" id="addCustomerCard">
                <h3 class="card-title">➕ Walk-in Client</h3>
                <div class="input-stack">
                    <button class="btn-random" onclick="spawnRandomClient()" id="randomBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                        Spawn Random
                    </button>
                    <div class="or-divider"><span>MANUAL ENTRY</span></div>
                    <select id="service">
                        <option value="Cash Deposit">💵 Cash Deposit</option>
                        <option value="Cash Withdrawal">💸 Cash Withdrawal</option>
                        <option value="Account Services">📁 Account Services</option>
                        <option value="Loan Inquiry">🏡 Loan Inquiry</option>
                        <option value="Priority Service">⭐ Priority Service</option>
                    </select>
                    <div class="priority-toggle">
                        <button class="priority-btn" id="priorityBtn" onclick="togglePriority()" data-vip="false">
                            <span class="priority-icon">☆</span>
                            <span class="priority-label">Regular Priority</span>
                        </button>
                    </div>
                    <button class="btn-primary" onclick="addCustomer()" id="addBtn">Add to Queue</button>
                </div>
            </section>

            <!-- Simulation Controls -->
            <section class="sidebar-card">
                <h3 class="card-title">⚙️ Control Panel</h3>
                <div class="control-row">
                    <span class="control-label">Simulation Mode</span>
                    <div class="toggle-pill">
                        <button class="toggle-opt active" id="modeManual" onclick="setMode('manual')">Manual</button>
                        <button class="toggle-opt" id="modeAuto" onclick="setMode('auto')">Auto</button>
                    </div>
                </div>
                <div class="control-row">
                    <span class="control-label">Tick Speed</span>
                    <div class="speed-btns">
                        <button class="speed-btn active" onclick="setSpeed(1)" data-speed="1">1×</button>
                        <button class="speed-btn" onclick="setSpeed(2)" data-speed="2">2×</button>
                        <button class="speed-btn" onclick="setSpeed(5)" data-speed="5">5×</button>
                    </div>
                </div>
                <div class="sim-actions">
                    <button class="btn-pause" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
                    <button class="btn-danger-sm" onclick="resetDatabase()">↺ Reset Data</button>
                </div>
            </section>

            <!-- Live Stats -->
            <section class="sidebar-card">
                <h3 class="card-title">📊 Analytics Overview</h3>
                <div class="stats-grid">
                    <div class="stat-item"><span class="stat-val" id="statServed">0</span><span class="stat-lbl">Served</span></div>
                    <div class="stat-item"><span class="stat-val" id="statWaiting">0</span><span class="stat-lbl">Waiting</span></div>
                    <div class="stat-item" style="grid-column: span 2;"><span class="stat-val" id="statAvgWait">0s</span><span class="stat-lbl">Average Wait Time</span></div>
                </div>
            </section>
        </aside>

        <!-- ══════════ MAIN LOBBY FLOOR ══════════ -->
        <main class="lobby-floor" id="lobbyFloor">
            <!-- Digital Display -->
            <div class="board-container">
                <div class="announcer-board" id="announcerBoard">
                    <span class="board-title">NOW SERVING</span>
                    <span class="ann-token">AWAITING</span>
                    <span class="ann-dest">NEXT CLIENT</span>
                </div>
            </div>

            <!-- Bank Floor: Desks and Queues -->
            <div class="bank-floor">
                <!-- Counters dynamically injected -->
                <div class="counters-row" id="countersRow"></div>
                <!-- Moving component container -->
                <div class="walking-area" id="walkingArea"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
