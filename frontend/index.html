<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Queue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="errorOverlay" class="error-overlay hidden">
        <div class="error-modal">
            <h2>⚠️ Connection Error</h2>
            <p>Backend server not running....</p>
        </div>
    </div>

    <main class="main-container" id="mainContainer">
        <header>
            <h1>Smart Queue</h1>
            <p>Experience seamless service flow</p>
            <button class="reset-btn" onclick="resetDatabase()">Reset Database</button>
        </header>

        <div class="layout-grid">
            <div class="left-col">
                <section class="card controls-card">
                    <div class="input-group">
                        <input type="text" id="name" placeholder="Customer Name (e.g. John Doe)" autocomplete="off">
                        <select id="service">
                            <option value="General">General</option>
                            <option value="Billing">Billing</option>
                            <option value="Support">Support</option>
                        </select>
                        <button class="primary-btn" onclick="addCustomer()">Add to Queue</button>
                    </div>
                </section>

                <section class="card queue-status-card">
                    <div class="status-metrics">
                        <div class="metric">
                            <span class="metric-label">Waiting</span>
                            <span class="metric-value" id="waitingCount">0</span>
                        </div>
                        <button class="serve-next-btn" onclick="serveCustomer()">Serve Next</button>
                    </div>
                    
                    <div class="queue-list-container">
                        <div class="list-header">
                            <h3>Current Queue</h3>
                        </div>
                        <div class="queue-list-wrapper">
                             <ul id="queueList">
                                 <!-- Automatically injected by JS -->
                             </ul>
                        </div>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <section class="card history-card">
                    <div class="list-header">
                        <h3>Past Customers</h3>
                        <span class="badge" id="servedCount">0</span>
                    </div>
                    <div class="queue-list-wrapper">
                         <ul id="historyList">
                             <!-- Automatically injected by JS -->
                         </ul>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
